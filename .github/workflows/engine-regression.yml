name: Ripple Engine Regression

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  engine:
    name: Core, CLI, MCP, and drift-control proof
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run engine regression suite
        run: npm run test:engine
